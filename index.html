<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JARVIS STATION</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
/* ============================================================
   PHASE 0 PALETTE - preserved exactly
   ============================================================ */
:root {
  --bg:         #0d0d0d;
  --panel:      #111111;
  --border:     #2a2218;
  --amber:      #c9a227;
  --amber-dim:  #7a5e10;
  --amber-lo:   #2a1f05;
  --green:      #3a7d44;
  --green-hi:   #4caf60;
  --red:        #8b2020;
  --red-hi:     #c0392b;
  --text:       #d4b86a;
  --text-dim:   #5a4a25;
  --mono:       'Courier New', Courier, monospace;
  --nav-h:      64px;
  --hud-h:      48px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  /* Use --app-h set by JS (window.innerHeight) to handle iOS Safari chrome correctly */
  height: var(--app-h, 100vh);
  width: 100%;
  overflow: hidden;
}

/* scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  display: flex;
  flex-direction: column;
  height: var(--app-h, 100vh);
  width: 100vw;
  position: fixed;   /* prevents iOS scroll-bounce pushing content off screen */
  top: 0;
  left: 0;
}

/* ---- HUD TOP ---- */
#hud-top {
  flex: 0 0 var(--hud-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 28px; height: 28px;
  border: 2px solid var(--amber);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--amber);
  box-shadow: 0 0 8px rgba(201,162,39,0.3);
  animation: pulse 3s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 8px rgba(201,162,39,0.3); }
  50%      { box-shadow: 0 0 18px rgba(201,162,39,0.7); }
}

.logo-text {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--amber);
  text-transform: uppercase;
}

.hud-stats {
  display: flex;
  align-items: center;
  gap: 16px;
}

.stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}

.stat-val {
  font-size: 14px;
  color: var(--amber);
  font-weight: bold;
  line-height: 1;
}

.stat-lbl {
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.ws-group {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.ws-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
}
.ws-dot.connected   { background: var(--amber); box-shadow: 0 0 6px rgba(201,162,39,0.7); }
.ws-dot.connecting  { background: var(--amber-dim); animation: blink 1s step-start infinite; }

@keyframes blink { 50% { opacity: 0; } }

/* ---- MAIN AREA ---- */
#main-area {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
}

/* Phaser canvas - fills main area */
#phaser-mount {
  position: absolute;
  inset: 0;
  z-index: 1;
}

#phaser-mount canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* ---- MISSIONS OVERLAY ---- */
#missions-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: var(--bg);
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#missions-overlay.active { display: flex; }

.missions-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--amber);
  text-transform: uppercase;
  flex-shrink: 0;
}

#missions-list {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 12px 12px 8px;
  -webkit-overflow-scrolling: touch;
}

/* chain selector (list of available chains) */
.chain-selector {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.chain-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 16px;
  cursor: pointer;
  text-align: left;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 52px;
  transition: border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.chain-btn:active, .chain-btn:hover {
  border-color: var(--amber);
  background: var(--amber-lo);
}

.chain-name { color: var(--amber); font-weight: bold; }
.chain-meta { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
.chain-arrow { color: var(--amber-dim); font-size: 16px; }

/* step cards */
#step-view {
  display: none;
  flex-direction: column;
  height: 100%;
}

#step-view.active { display: flex; }

.step-back-btn {
  background: none;
  border: none;
  color: var(--amber-dim);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  padding: 10px 16px;
  text-align: left;
  letter-spacing: 1px;
  flex-shrink: 0;
  min-height: 44px;
}

.step-back-btn:active { color: var(--amber); }

.step-chain-title {
  padding: 0 16px 10px;
  font-size: 13px;
  color: var(--amber);
  letter-spacing: 1px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

#steps-scroll {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 12px;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.step-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
}

.step-card.manual { border-color: var(--amber-dim); }
.step-card.done   { border-color: var(--green); opacity: 0.6; }
.step-card.stuck  { border-color: var(--red); }
.step-card.running { border-color: var(--amber); }

.step-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.step-num {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.step-type-badge {
  font-size: 9px;
  letter-spacing: 1px;
  padding: 2px 6px;
  border-radius: 2px;
  text-transform: uppercase;
}

.badge-manual   { background: var(--amber-lo); color: var(--amber); border: 1px solid var(--amber-dim); }
.badge-auto     { background: #0d1a10; color: var(--green); border: 1px solid #1a3d20; }
.badge-done     { background: #0d1a10; color: var(--green-hi); border: 1px solid var(--green); }
.badge-stuck    { background: #1a0d0d; color: var(--red-hi); border: 1px solid var(--red); }

.step-title {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 6px;
  font-weight: bold;
}

.step-instruction {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 10px;
}

.step-content-block {
  background: #0a0a0a;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px;
  font-size: 11px;
  color: var(--text);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 120px;
  overflow-y: auto;
  margin-bottom: 10px;
}

.step-nav-block {
  margin: 8px 0;
  padding: 8px 10px;
  border: 1px solid var(--green);
  border-radius: 3px;
  background: rgba(58,125,68,0.05);
}

.nav-label {
  display: block;
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--green-hi);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.nav-url-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.nav-url-display {
  flex: 1;
  font-size: 10px;
  color: var(--text-dim);
  word-break: break-all;
  min-width: 0;
}

.btn-copy-url {
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green-hi);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 2px;
  cursor: pointer;
  letter-spacing: 1px;
}

.btn-copy-url:active { background: rgba(58,125,68,0.3); }

/* Multi-target sub-card styles (ADR-004) */
.step-multi-container {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 12px 6px;
  background: var(--panel);
  margin-bottom: 10px;
}

.step-multi-header {
  margin-bottom: 10px;
}

.step-sub-card {
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px;
  margin-bottom: 8px;
  background: #0d0d0d;
}

.sub-card-header {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}

.sub-label {
  font-size: 11px;
  font-weight: bold;
  color: var(--amber);
  letter-spacing: 1px;
  background: var(--amber-lo);
  border: 1px solid var(--amber-dim);
  border-radius: 3px;
  padding: 2px 8px;
}

.step-bank-title {
  background: #0a0a0a;
  border: 1px solid var(--amber);
  border-radius: 3px;
  padding: 8px 10px;
  font-size: 11px;
  color: var(--amber);
  line-height: 1.4;
  word-break: break-word;
  margin-bottom: 6px;
}

.bank-label {
  display: inline-block;
  background: var(--amber);
  color: #000;
  font-size: 9px;
  font-weight: bold;
  padding: 1px 4px;
  border-radius: 2px;
  margin-right: 6px;
  letter-spacing: 0.05em;
  vertical-align: middle;
}

.step-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.step-btn {
  flex: 1;
  min-width: 80px;
  min-height: 44px;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn-copy   { background: var(--amber-lo); color: var(--amber); border-color: var(--amber-dim); }
.btn-copy:active { background: #3a2a05; }

.btn-link   { background: #0a1520; color: #4a90d9; border-color: #1a3a5c; }
.btn-link:active { background: #0d1f30; }

.btn-done   { background: #0d1a10; color: var(--green-hi); border-color: var(--green); }
.btn-done:active { background: #152a1a; }

.btn-stuck  { background: #1a0d0d; color: var(--red-hi); border-color: var(--red); }
.btn-stuck:active { background: #2a1515; }

.step-workaround {
  font-size: 10px;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 8px;
  padding: 6px 8px;
  border-left: 2px solid var(--amber-dim);
}

.step-status-msg {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  padding: 6px;
  letter-spacing: 1px;
}

/* ---- ADR-005: PER-FIELD CARD ---- */
.per-field-card .pf-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(201,162,39,0.1);
}
.per-field-card .pf-row:last-of-type { border-bottom: none; }
.pf-label {
  flex-shrink: 0;
  min-width: 80px;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--amber);
  font-weight: 600;
  padding-top: 2px;
}
.pf-value {
  flex: 1;
  word-break: break-word;
  font-size: 11px;
  color: var(--text);
  line-height: 1.5;
  max-height: 100px;
  overflow-y: auto;
}
.pf-copy { flex-shrink: 0; }
.pf-thumb-note {
  margin-top: 8px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  padding: 6px 8px;
  border: 1px dashed rgba(201,162,39,0.2);
  border-radius: 4px;
}
.pf-fields-block {
  background: #0a0a0a;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 10px;
  margin-bottom: 10px;
}

/* ---- ADR-005: AUTO-COMPLETED STEP (collapsed) ---- */
.step-auto-done {
  padding: 8px 12px;
  border-left: 3px solid var(--green-hi);
  background: rgba(76,175,96,0.04);
  margin-bottom: 6px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.step-auto-done .auto-check {
  color: var(--green-hi);
  font-size: 12px;
  flex-shrink: 0;
}
.step-auto-done .auto-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--green-hi);
  flex: 1;
}
.step-auto-done .auto-detail {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}

/* ---- ADR-005: CHAIN PROGRESS IN LIST ---- */
.chain-progress {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  margin-top: 2px;
}
.chain-progress .done-count { color: var(--green-hi); font-weight: bold; }

/* ---- ADR-005: RATE LIMIT WARNING ---- */
.step-rate-limit {
  padding: 12px;
  background: rgba(255,165,0,0.06);
  border-left: 3px solid #c97a20;
  border-radius: 4px;
  font-size: 11px;
  color: #c9a227;
  line-height: 1.5;
  margin-bottom: 6px;
}

/* ---- ADR-005: PUBLISHED STATUS BADGE ---- */
.badge-published {
  background: #0d1a10;
  color: var(--green-hi);
  border: 1px solid var(--green);
}

/* ---- LOG PANEL ---- */
#log-panel {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: var(--bg);
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#log-panel.active { display: flex; }

.log-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--amber);
  text-transform: uppercase;
  flex-shrink: 0;
}

#log-entries {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 8px 12px;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.log-line {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.4;
  animation: fadein 0.3s ease;
}

.log-line .log-tag { color: var(--amber-dim); margin-right: 6px; }
.log-line .log-msg { color: var(--text); }
.log-line .log-ts  { color: #3a3020; font-size: 9px; margin-right: 6px; }

@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

/* ---- HUD BOTTOM NAV ---- */
#hud-bottom {
  flex: 0 0 var(--nav-h);
  min-height: var(--nav-h);
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--panel);
  z-index: 100;
  /* safe area for iPhone home indicator */
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.nav-btn {
  flex: 1;
  background: none;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-height: var(--nav-h);
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.nav-btn:last-child { border-right: none; }
.nav-btn .nav-icon { font-size: 18px; }

.nav-btn.active {
  background: var(--amber-lo);
  color: var(--amber);
  border-bottom: 2px solid var(--amber);
}

.nav-btn:active:not(.active) {
  background: #181408;
}

/* ---- ROOM DETAIL TOOLTIP ---- */
#room-tooltip {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel);
  border: 1px solid var(--amber-dim);
  border-radius: 4px;
  padding: 8px 14px;
  font-size: 11px;
  color: var(--text);
  z-index: 50;
  display: none;
  text-align: center;
  max-width: 240px;
  pointer-events: none;
  animation: fadein 0.2s ease;
}

/* ---- LOADING INDICATOR ---- */
#loading-msg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 2px;
  z-index: 5;
  pointer-events: none;
}

/* ---- RESPONSIVE ---- */
@media (max-width: 480px) {
  .hud-stats { gap: 10px; }
  .stat-val  { font-size: 13px; }
  .logo-text { display: none; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ===================== HUD TOP ===================== -->
  <div id="hud-top">
    <div class="logo">
      <div class="logo-mark">J</div>
      <div class="logo-text">JARVIS&nbsp;STATION</div>
    </div>

    <div class="hud-stats">
      <div class="stat-item">
        <div class="stat-val" id="statPipeline">IDLE</div>
        <div class="stat-lbl">STATUS</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="statProducts">35</div>
        <div class="stat-lbl">PRODUCTS</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="statRevenue">$0</div>
        <div class="stat-lbl">REVENUE</div>
      </div>
    </div>

    <div class="ws-group">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">OFFLINE</span>
    </div>
  </div>

  <!-- ===================== MAIN AREA ===================== -->
  <div id="main-area">

    <div id="loading-msg">INITIALIZING...</div>

    <!-- Phaser canvas target -->
    <div id="phaser-mount"></div>

    <!-- Missions overlay (HTML-driven, shown over canvas) -->
    <div id="missions-overlay">
      <div class="missions-header">// MISSIONS &nbsp;&nbsp; ACTIVE CHAINS</div>
      <div id="missions-list">
        <div class="chain-selector" id="chain-selector">
          <div style="color:var(--text-dim);font-size:11px;padding:20px;text-align:center;letter-spacing:1px;">
            LOADING CHAINS...
          </div>
        </div>
        <div id="step-view" class="step-view">
          <button class="step-back-btn" id="stepBackBtn">&#8592; BACK TO MISSIONS</button>
          <div class="step-chain-title" id="stepChainTitle">CHAIN NAME</div>
          <div id="steps-scroll"></div>
        </div>
      </div>
    </div>

    <!-- Log panel -->
    <div id="log-panel">
      <div class="log-header">// COMMS &nbsp;&nbsp; ACTIVITY LOG</div>
      <div id="log-entries"></div>
    </div>

    <!-- Room tooltip -->
    <div id="room-tooltip"></div>

  </div><!-- /main-area -->

  <!-- ===================== HUD BOTTOM NAV ===================== -->
  <div id="hud-bottom">
    <button class="nav-btn active" id="navStation" onclick="SceneManager.switch('station')">
      <span class="nav-icon">&#9632;</span>
      <span>STATION</span>
    </button>
    <button class="nav-btn" id="navMissions" onclick="SceneManager.switch('missions')">
      <span class="nav-icon">&#9654;</span>
      <span>MISSIONS</span>
    </button>
    <button class="nav-btn" id="navLog" onclick="SceneManager.switch('log')">
      <span class="nav-icon">&#9654;&#9474;</span>
      <span>LOG</span>
    </button>
  </div>

</div><!-- /app -->

<script>
'use strict';

// ============================================================
//  MOBILE VIEWPORT FIX
//  iOS Safari reports 100vh including the browser chrome bar,
//  which pushes the bottom nav off screen. Fix by measuring
//  window.innerHeight (true visible height) and setting --app-h.
// ============================================================
(function fixViewport() {
  function setH() {
    document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
  }
  setH();
  window.addEventListener('resize', setH);
  window.addEventListener('orientationchange', function() { setTimeout(setH, 100); });
})();

// ============================================================
//  CONFIG
// ============================================================
const CONFIG = {
  railwayUrl:    'https://web-production-eb2a6.up.railway.app',
  webhookKey:    'jarvis-pipeline-2026',
  wsReconnectMs: 5000,
  maxLogLines:   80,
  pollMs:        30000,

  // Phase 1: hardcoded known stats. Phase 2: pull from /api/game/state
  // FUTURE: replace with live API call when /api/game/state endpoint added
  stats: { products: 35, revenue: 0 },

// ============================================================
//  LOGGING
// ============================================================
function log(tag, msg) {
  const ts   = new Date().toLocaleTimeString('en-US', {hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const el   = document.getElementById('log-entries');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-ts">${ts}</span><span class="log-tag">[${tag.toUpperCase()}]</span><span class="log-msg">${escHtml(msg)}</span>`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > CONFIG.maxLogLines) el.removeChild(el.firstChild);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
//  API CLIENT
//  REST uses ?key= auth. WebSocket uses JWT.
// ============================================================
async function apiFetch(path, options = {}) {
  const sep  = path.includes('?') ? '&' : '?';
  const url  = `${CONFIG.railwayUrl}${path}${sep}key=${CONFIG.webhookKey}`;
  const res  = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options
  });
  if (!res.ok) throw new Error(`${res.status} ${path}`);
  return res.json();
}

async function apiGet(path)        { return apiFetch(path); }
async function apiPost(path, body) { return apiFetch(path, { method: 'POST', body: JSON.stringify(body) }); }

      ]);
      this.metrics['command']    = pipeline.running ? 'RUNNING' : 'IDLE';
      this.metrics['forge']      = CONFIG.stats.products + ' products';
      this.metrics['governance'] = (chains.chains || []).length + ' chains live';
      HUDLayer.updateStats({ pipeline });
      HUDLayer.updateRoomDots(pipeline.running);
      if (window._phaserScene && window._phaserScene.drawRooms) {

// ============================================================
//  WEBSOCKET CLIENT
// ============================================================
async function fetchToken() {
  try {
    const data = await fetch(`${CONFIG.railwayUrl}/api/auth/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: CONFIG.webhookKey })
    }).then(r => r.json());
    jwtToken = data.token;
    log('auth', 'JWT issued');
    return true;
  } catch (e) {
    log('auth', `Token fetch failed: ${e.message}`);
    return false;
  }
}

async function connectWS() {
  const ok = await fetchToken();
  if (!ok) { scheduleReconnect(); return; }

  HUDLayer.setWsStatus('connecting');
  const wsUrl = `${CONFIG.railwayUrl.replace('https://','wss://')}/ws?token=${jwtToken}`;

  try {
    wsConn = new WebSocket(wsUrl);
  } catch (e) {
    log('ws', `WS init error: ${e.message}`);
    scheduleReconnect();
    return;
  }

  wsConn.onopen = () => {
    HUDLayer.setWsStatus('connected');
    log('ws', 'Connected to Jarvis backend');
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    startRestFallback();
  };

  wsConn.onmessage = (e) => {
    try { handleMessage(JSON.parse(e.data)); } catch (_) {}
  };

  wsConn.onerror = () => {
    log('ws', 'WS error');
    HUDLayer.setWsStatus('connecting');
  };

  wsConn.onclose = (e) => {
    HUDLayer.setWsStatus('');
    log('ws', `Disconnected (${e.code}). Reconnecting in ${CONFIG.wsReconnectMs/1000}s...`);
    scheduleReconnect();
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'game_state':
    case 'connected':
      HUDLayer.updateStats(msg);
      if (msg.pipeline) HUDLayer.updateRoomDots(msg.pipeline.running);
      if (msg.chains)   log('ws', `${msg.chains.length} chains loaded`);
      document.getElementById('loading-msg').style.display = 'none';
      break;

    case 'chain_update':
      log('chain', `Chain update: ${JSON.stringify(msg.data || {}).slice(0,80)}`);
      if (currentRunId && msg.data && msg.data.run_id === currentRunId) {
        renderStepStatus(msg.data);
      }
      break;

    case 'notification':
      log('notif', msg.data?.title || msg.data?.message || 'Notification received');
      break;

    default:
      break;
  }
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    reconnects++;
    log('ws', `Reconnect attempt #${reconnects}`);
    connectWS();
  }, CONFIG.wsReconnectMs);
}

// REST fallback: poll pipeline status + room metrics every 30s
function startRestFallback() {
  if (pollTimer) clearInterval(pollTimer);
  RoomData.refresh();  // immediate first fetch
  pollTimer = setInterval(() => RoomData.refresh(), CONFIG.pollMs);
}

// ============================================================
//  PHASER STATION SCENE
// ============================================================
class StationScene extends Phaser.Scene {
  constructor() { super({ key: 'StationScene' }); }

  create() {
    window._phaserScene = this;
    this.roomObjects  = {};  // id -> { rect, dot, label }
    this.roomStatuses = {};  // id -> 'green'|'amber'|'red'
    CONFIG.rooms.forEach(r => { this.roomStatuses[r.id] = 'amber'; });
    this.drawRooms();

    // Handle resize
    this.scale.on('resize', this.drawRooms, this);
  }

  drawRooms() {
    // Clear existing objects
    this.children.list.slice().forEach(c => c.destroy());
    this.roomObjects = {};

    const W      = this.scale.width;
    const H      = this.scale.height;
    const cols   = 3;  // ForgeCore 3x3 grid
    const rows   = Math.ceil(CONFIG.rooms.length / cols);
    const pad    = 10;
    const gapX   = 8;
    const gapY   = 8;
    const cellW  = (W - pad * 2 - gapX * (cols - 1)) / cols;
    const cellH  = (H - pad * 2 - gapY * (rows - 1)) / rows;

    // Background
    this.add.rectangle(W/2, H/2, W, H, 0x0d0d0d);

    CONFIG.rooms.forEach((room, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x   = pad + col * (cellW + gapX) + cellW / 2;
      const y   = pad + row * (cellH + gapY) + cellH / 2;

      const status = this.roomStatuses[room.id] || room.status || 'partial';
      const colors = this._roomColors(status);

      // Room rectangle
      const rect = this.add.rectangle(x, y, cellW, cellH, colors.fill)
        .setStrokeStyle(1, colors.border)
        .setInteractive()
        .on('pointerdown', () => this._onRoomTap(room, status));

      // Corner accent lines (steampunk feel)
      const g = this.add.graphics();
      const accentLen = Math.min(cellW, cellH) * 0.15;
      g.lineStyle(1, colors.border, 0.4);
      const x0 = x - cellW/2, x1 = x + cellW/2;
      const y0 = y - cellH/2, y1 = y + cellH/2;
      g.strokeLineShape(new Phaser.Geom.Line(x0, y0, x0 + accentLen, y0));
      g.strokeLineShape(new Phaser.Geom.Line(x0, y0, x0, y0 + accentLen));
      g.strokeLineShape(new Phaser.Geom.Line(x1, y0, x1 - accentLen, y0));
      g.strokeLineShape(new Phaser.Geom.Line(x1, y0, x1, y0 + accentLen));
      g.strokeLineShape(new Phaser.Geom.Line(x0, y1, x0 + accentLen, y1));
      g.strokeLineShape(new Phaser.Geom.Line(x0, y1, x0, y1 - accentLen));
      g.strokeLineShape(new Phaser.Geom.Line(x1, y1, x1 - accentLen, y1));
      g.strokeLineShape(new Phaser.Geom.Line(x1, y1, x1, y1 - accentLen));

      // Room label (shifted up slightly to make room for metric)
      const fontSize   = Math.max(9, Math.min(12, cellW / 9));
      const metricSize = Math.max(8, Math.min(10, cellW / 11));
      const label = this.add.text(x, y - 14, room.label, {
        fontSize: `${fontSize}px`,
        fontFamily: 'Courier New, monospace',
        color: colors.text,
        align: 'center',
        lineSpacing: 2
      }).setOrigin(0.5, 0.5);

      // Live metric subtitle
      const metricVal = RoomData.metrics[room.id] || room.metric || '';
      this.add.text(x, y + 8, metricVal, {
        fontSize: `${metricSize}px`,
        fontFamily: 'Courier New, monospace',
        color: colors.metric || colors.dot_text || '#5a4a25',
        align: 'center'
      }).setOrigin(0.5, 0.5);

      // Status dot (top-right corner)
      const dotR = Math.max(4, Math.min(6, cellW / 16));
      const dot  = this.add.circle(x + cellW/2 - dotR - 4, y - cellH/2 + dotR + 4, dotR, colors.dot);

      this.roomObjects[room.id] = { rect, dot, label };
    });
  }

  _roomColors(status) {
    switch (status) {
      case 'green':
      case 'live':    return { fill: 0x0d1a10, border: 0x3a7d44, text: '#4caf60', dot: 0x3a7d44, metric: '#2d6e3a' };
      case 'partial': return { fill: 0x111111, border: 0x2a2218, text: '#d4b86a', dot: 0x7a5e10, metric: '#5a4a25' };
      case 'planned': return { fill: 0x0a0a0a, border: 0x1a1510, text: '#3a3028', dot: 0x1a1510, metric: '#2a2018' };
      case 'red':     return { fill: 0x1a0d0d, border: 0x8b2020, text: '#c0392b', dot: 0x8b2020, metric: '#5a1515' };
      default:        return { fill: 0x111111, border: 0x2a2218, text: '#d4b86a', dot: 0x7a5e10, metric: '#5a4a25' };
    }
  }

  setRoomStatus(roomId, status) {
    this.roomStatuses[roomId] = status;
    this.drawRooms();
  }

  _onRoomTap(room, status) {
    const statusMap = { live: 'LIVE', green: 'ACTIVE', partial: 'BUILDING', planned: 'QUEUED', red: 'ERROR' };
    const statusLabel = statusMap[status] || 'IDLE';
    const metric = RoomData.metrics[room.id] || room.metric || '';
    const tasks  = room.tasks.length ? room.tasks.join(', ') : 'no tasks wired';
    HUDLayer.showTooltip(`${room.label.replace('\n',' ')}  [${statusLabel}]  ${metric}\n${tasks}`);
    log('station', `${room.label.replace('\n',' ')} tapped (${statusLabel})`);
  }
}

// ============================================================
//  MISSIONS - HTML overlay, Phaser just manages transition
// ============================================================
const Missions = {
  chains: [],

  async load() {
    const sel = document.getElementById('chain-selector');
    sel.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:20px;text-align:center;letter-spacing:1px;">LOADING CHAINS...</div>';
    try {
      const data = await apiGet('/api/chain/list');
      this.chains = data.chains || [];
      await this._renderChainList();
      log('missions', `${this.chains.length} chains loaded`);
    } catch (e) {
      sel.innerHTML = `<div style="color:var(--red);font-size:11px;padding:20px;text-align:center;">${escHtml(e.message)}</div>`;
      log('missions', `Failed to load chains: ${e.message}`);
    }
  },

  async _renderChainList() {
    const sel = document.getElementById('chain-selector');
    const sv  = document.getElementById('step-view');
    sel.style.display = '';
    sv.classList.remove('active');

    if (!this.chains.length) {
      sel.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:20px;text-align:center;letter-spacing:1px;">NO CHAINS CONFIGURED</div>';
      return;
    }

    sel.innerHTML = '';
    // ADR-005: Fetch progress for all chains in parallel (graceful failure)
    const progressMap = {};
    try {
      const progressPromises = this.chains.map(async (chain) => {
        try {
          const data = await apiGet(`/api/chain/resume?chain_id=${chain.chain_id}`);
          if (data && data.run_id && data.step_progress) {
            const done = data.step_progress.filter(s => s.status === 'done').length;
            const total = data.step_progress.length;
            progressMap[chain.chain_id] = { done, total };
          }
        } catch (_) { /* resume endpoint not deployed yet, ignore */ }
      });
      await Promise.all(progressPromises);
    } catch (_) {}

    this.chains.forEach(chain => {
      const btn = document.createElement('button');
      btn.className = 'chain-btn';
      const platform = chain.platform || chain.chain_id?.split('_')[0] || '';
      const iconMap   = { reddit: '&#9650;', gumroad: '&#9670;', quora: '&#9642;', x: '&#8416;', twitter: '&#8416;' };
      const icon      = iconMap[platform] || '&#9671;';
      const prog      = progressMap[chain.chain_id];
      const progressHtml = prog
        ? `<div class="chain-progress"><span class="done-count">${prog.done}</span> / ${prog.total} done</div>`
        : '';
      btn.innerHTML   = `
        <div>
          <div class="chain-name">${icon} &nbsp;${escHtml(chain.name || chain.chain_id)}</div>
          <div class="chain-meta">${chain.step_count || 0} steps &nbsp;|&nbsp; ${escHtml(platform.toUpperCase() || 'MANUAL')}</div>
          ${progressHtml}
        </div>
        <span class="chain-arrow">&#8250;</span>`;
      btn.onclick = () => this._startChain(chain);
      sel.appendChild(btn);
    });
  },

  // ADR-005: Try to resume an active run first, fall back to starting fresh.
  // This enables progress persistence across page reloads and sessions.
  async _startChain(chain) {
    log('chain', `Loading chain: ${chain.chain_id}`);
    currentChain = chain;

    try {
      // Try resume first (graceful no-op if endpoint doesn't exist yet)
      let resumed = false;
      try {
        const resumeData = await apiGet(`/api/chain/resume?chain_id=${chain.chain_id}`);
        if (resumeData && resumeData.run_id) {
          currentRunId = resumeData.run_id;
          currentSteps = resumeData.steps || [];
          // Apply step progress to mark completed steps
          const progress = resumeData.step_progress || [];
          progress.forEach(sp => {
            if (sp.status === 'done' && currentSteps[sp.index]) {
              currentSteps[sp.index]._completed = true;
              currentSteps[sp.index]._completed_at = sp.completed_at;
            }
          });
          resumed = true;
          log('chain', `Resumed run: ${currentRunId} (${progress.filter(s => s.status === 'done').length} steps done)`);
        }
      } catch (_) {
        // /api/chain/resume not deployed yet, fall through to start
      }

      // No active run, start fresh
      if (!resumed) {
        const result = await apiPost('/api/chain/start', { chain_id: chain.chain_id });
        currentRunId = result.run_id;
        currentSteps = result.steps || [];
        log('chain', `Run started: ${currentRunId}`);
      }

      this._renderStepView(chain);
    } catch (e) {
      log('chain', `Chain load failed: ${e.message}`);
      HUDLayer.showTooltip(`Error: ${e.message}`);
    }
  },

  _renderStepView(chain) {
    const sel    = document.getElementById('chain-selector');
    const sv     = document.getElementById('step-view');
    const title  = document.getElementById('stepChainTitle');
    const scroll = document.getElementById('steps-scroll');

    sel.style.display = 'none';
    sv.classList.add('active');
    title.textContent = (chain.name || chain.chain_id).toUpperCase();

    scroll.innerHTML = '';
    currentSteps.forEach((step, idx) => {
      scroll.appendChild(this._renderStep(step, idx));
    });
  },

  // ADR-005: Single entry point for all step rendering.
  // Routes by explicit card_type first (long-term design system pattern),
  // then by content-shape detection (backward compat for configs without card_type).
  _renderStep(step, idx) {
    // 1. Auto-completed steps render as collapsed one-liners
    if (step._auto_done) return this._buildAutoCompletedCard(step, idx);

    // 2. Rate-limited steps show warning card
    if (step._rate_limited) return this._buildRateLimitCard(step, idx);

    // 3. Explicit card_type from config (long-term pattern, set up for future)
    const cardType = step.card_type || null;
    if (cardType === 'per_field')         return this._buildPerFieldCard(step, idx);
    if (cardType === 'multi_target')      return this._buildMultiTargetContainer(step, idx, step.default_content?.posts || []);
    if (cardType === 'progress_summary')  return this._buildStepCard(step, idx); // FUTURE: dedicated progress card

    // 4. Content-shape detection (backward compat - no config changes needed)
    if (step.default_content?.product)    return this._buildPerFieldCard(step, idx);
    const posts = step.default_content?.posts || [];
    const hasTargets = posts.some(p => Array.isArray(p.targets) && p.targets.length > 0);
    if (hasTargets && step.type === 'manual') return this._buildMultiTargetContainer(step, idx, posts);

    // 5. Default: standard step card
    return this._buildStepCard(step, idx);
  },

  // ADR-005: Collapsed one-liner for auto-completed steps
  _buildAutoCompletedCard(step, idx) {
    const card = document.createElement('div');
    card.className = 'step-auto-done';
    card.id = `step-card-${idx}`;
    const result = step._executor_result || {};
    const detail = result.message || result.selected_id || '';
    card.innerHTML = `
      <span class="auto-check">&#10003;</span>
      <span class="auto-label">${escHtml(step.name || `Step ${idx + 1}`)}</span>
      ${detail ? `<span class="auto-detail">${escHtml(String(detail).slice(0, 60))}</span>` : ''}`;
    return card;
  },

  // ADR-005: Rate limit warning card
  _buildRateLimitCard(step, idx) {
    const card = document.createElement('div');
    card.className = 'step-rate-limit';
    card.id = `step-card-${idx}`;
    const info = step._rate_limit_info || {};
    const nextAt = info.next_allowed_at || 'later';
    card.innerHTML = `
      <div style="font-weight:bold;margin-bottom:4px;letter-spacing:1px;">RATE LIMIT</div>
      <div>${escHtml(step.instruction || 'Maximum actions reached for today. Come back tomorrow.')}</div>
      ${info.count ? `<div style="margin-top:6px;font-size:10px;color:var(--text-dim);">${info.count} of ${info.max} used today. Next available: ${escHtml(nextAt)}</div>` : ''}`;
    return card;
  },

  // ADR-005: Per-field copy card for structured data entry (Gumroad bundles, etc.)
  _buildPerFieldCard(step, idx) {
    const card = document.createElement('div');
    card.className = 'step-card manual per-field-card';
    card.id = `step-card-${idx}`;

    const product = step.default_content?.product || {};
    const config = step.card_config || {};

    // Fields to show: explicit config, or auto-detect from product keys
    const fields = config.fields || Object.keys(product).filter(k =>
      !k.startsWith('_') && !['id','status','gumroad_url','thumbnail','thumbnail_drive_path'].includes(k)
    );
    const labels = config.field_labels || {};

    // Status badge
    const isPublished = product.status === 'published';
    const statusBadge = isPublished
      ? '<span class="step-type-badge badge-published">PUBLISHED</span>'
      : '<span class="step-type-badge badge-manual">PENDING</span>';

    // Build per-field rows
    let fieldsHtml = '';
    fields.forEach(field => {
      const value = product[field] || '';
      if (!value) return;
      const label = labels[field] || field.replace(/_/g, ' ').toUpperCase();
      const fieldId = `pf-${idx}-${field}`;
      fieldsHtml += `
        <div class="pf-row">
          <span class="pf-label">${escHtml(label)}</span>
          <span class="pf-value" id="${fieldId}">${escHtml(value)}</span>
          <button class="btn-copy-url pf-copy" onclick="Missions._copyContentSub('${fieldId}', this)">COPY</button>
        </div>`;
    });

    // Thumbnail note
    const thumbPath = product.thumbnail_drive_path || '';
    const thumbNote = thumbPath
      ? `<div class="pf-thumb-note">THUMBNAIL: Open Google Drive &gt; ${escHtml(thumbPath)}</div>`
      : '';

    // Published URL note
    const pubUrl = product.gumroad_url || '';
    const pubNote = pubUrl
      ? `<div style="margin-top:6px;font-size:10px;color:var(--green-hi);letter-spacing:0.5px;">LIVE: ${escHtml(pubUrl)}</div>`
      : '';

    // Deep link for navigation
    const _chainId = (currentChain?.chain_id || currentChain?.id || '').toLowerCase();
    const platform = currentChain?.platform ||
      (_chainId.includes('gumroad') ? 'gumroad' :
       _chainId.includes('reddit')  ? 'reddit'  :
       _chainId.includes('quora')   ? 'quora'   : '');
    const navLink = this._buildDeepLink(platform, '', step, '', '');
    let navDisplayUrl = '';
    if (navLink) {
      try { const u = new URL(navLink); navDisplayUrl = u.hostname + u.pathname; }
      catch(_) { navDisplayUrl = navLink; }
    }

    card.innerHTML = `
      <div class="step-header">
        <span class="step-num">STEP ${idx + 1}</span>
        ${statusBadge}
      </div>
      <div class="step-title">${escHtml(step.name || `Step ${idx + 1}`)}</div>
      ${step.instruction ? `<div class="step-instruction">${escHtml(step.instruction)}</div>` : ''}
      ${(!isPublished && navLink) ? `<div class="step-nav-block">
        <span class="nav-label">NAVIGATE TO</span>
        <div class="nav-url-row">
          <span class="nav-url-display" id="step-nav-url-${idx}" data-full="${escHtml(navLink)}">${escHtml(navDisplayUrl)}</span>
          <button class="btn-copy-url" onclick="Missions._copyNav(${idx}, this)">COPY URL</button>
          <button class="step-btn btn-link" onclick="Missions._openLink(document.getElementById('step-nav-url-${idx}').dataset.full)">OPEN</button>
        </div>
      </div>` : ''}
      <div class="pf-fields-block">
        ${fieldsHtml}
      </div>
      ${thumbNote}
      ${pubNote}
      <div class="step-actions">
        ${isPublished
          ? '<div class="step-status-msg" style="color:var(--green-hi);">&#10003; PUBLISHED</div>'
          : `<button class="step-btn btn-done" onclick="Missions._recordEvent(${idx}, 'done', this, {product_id:'${escHtml(product.id || '')}', action:'published'})">DONE</button>
             <button class="step-btn btn-stuck" onclick="Missions._recordEvent(${idx}, 'stuck', this, {product_id:'${escHtml(product.id || '')}', reason:'blocked'})">STUCK</button>`}
      </div>
      ${step.workaround ? `<div class="step-workaround">${escHtml(step.workaround)}</div>` : ''}`;

    return card;
  },

  _buildStepCard(step, idx) {
    // Legacy card - used for steps without card_type or product data
    const posts = step.default_content?.posts || [];
    const hasTargets = posts.some(p => Array.isArray(p.targets) && p.targets.length > 0);
    if (hasTargets && step.type === 'manual') {
      return this._buildMultiTargetContainer(step, idx, posts);
    }

    const card   = document.createElement('div');
    const isManual = step.type === 'manual';
    card.className = `step-card ${isManual ? 'manual' : 'auto'}`;
    card.id        = `step-card-${idx}`;

    // Resolve content: generated_content first, then default_content bank (used when no executor exists)
    let content = step.generated_content || step.content || '';
    let _bankTitle = '';  // Reddit title field (separate from body)
    let _bankSub   = '';  // Reddit subreddit from bank post
    if (!content && step.default_content?.posts) {
      const post = step.default_content.posts.find(p => p.status === 'approved') || step.default_content.posts[0];
      if (post) {
        _bankTitle = post.title  || '';
        _bankSub   = post.subreddit || '';
        content    = post.body   || post.content || '';
      }
    }
    // Infer platform from chain_id if not explicitly set in chain config
    const _chainId = (currentChain?.chain_id || currentChain?.id || '').toLowerCase();
    const platform = currentChain?.platform ||
      (_chainId.includes('reddit')  ? 'reddit'  :
       _chainId.includes('quora')   ? 'quora'   :
       _chainId.includes('gumroad') ? 'gumroad' :
       _chainId.includes('pinterest') ? 'pinterest' : '');

    // Compute nav link before actionsHtml so it's available for nav block in card.innerHTML
    const navLink = isManual ? this._buildDeepLink(platform, content, step, _bankTitle, _bankSub) : null;
    // Display URL shows host+path only (no query params) -- keeps it readable on mobile
    let navDisplayUrl = '';
    if (navLink) {
      try { const u = new URL(navLink); navDisplayUrl = u.hostname + u.pathname; }
      catch(_) { navDisplayUrl = navLink.slice(0, 60); }
    }

    let actionsHtml = '';
    if (isManual) {
      actionsHtml = `
        <div class="step-actions">
          ${content ? `<button class="step-btn btn-copy" onclick="Missions._copyContent(${idx}, this)">COPY BODY</button>` : ''}
          <button class="step-btn btn-done"  onclick="Missions._recordEvent(${idx}, 'done',  this)">DONE</button>
          <button class="step-btn btn-stuck" onclick="Missions._recordEvent(${idx}, 'stuck', this)">STUCK</button>
        </div>
        ${step.workaround ? `<div class="step-workaround">${escHtml(step.workaround)}</div>` : ''}`;
    } else {
      actionsHtml = `<div class="step-status-msg">AUTOMATED &nbsp;&#9644;&nbsp; RUNNING ON SERVER</div>`;
    }

    card.innerHTML = `
      <div class="step-header">
        <span class="step-num">STEP ${idx + 1}</span>
        <span class="step-type-badge ${isManual ? 'badge-manual' : 'badge-auto'}">${isManual ? 'MANUAL' : 'AUTO'}</span>
      </div>
      <div class="step-title">${escHtml(step.name || step.label || `Step ${idx + 1}`)}</div>
      ${step.instruction ? `<div class="step-instruction">${escHtml(step.instruction)}</div>` : ''}
      ${navLink ? `<div class="step-nav-block">
        <span class="nav-label">NAVIGATE TO</span>
        <div class="nav-url-row">
          <span class="nav-url-display" id="step-nav-url-${idx}" data-full="${escHtml(navLink)}">${escHtml(navDisplayUrl)}</span>
          <button class="btn-copy-url" onclick="Missions._copyNav(${idx}, this)">COPY URL</button>
          <button class="step-btn btn-link" onclick="Missions._openLink(document.getElementById('step-nav-url-${idx}').dataset.full)">OPEN</button>
        </div>
      </div>` : ''}
      ${_bankTitle ? `<div class="step-bank-title" style="display:flex;align-items:flex-start;gap:6px;">
        <span class="bank-label" style="flex-shrink:0;">TITLE</span>
        <span id="step-title-text-${idx}" style="flex:1;word-break:break-word;">${escHtml(_bankTitle)}</span>
        <button class="btn-copy-url" style="flex-shrink:0;" onclick="Missions._copyContentSub('step-title-text-${idx}', this)">COPY</button>
      </div>` : ''}
      ${content ? `<div class="step-content-block" id="step-content-${idx}">${escHtml(content)}</div>` : ''}
      ${actionsHtml}`;

    return card;
  },

  // ADR-004: renders a container card with N sub-cards, one per active target subreddit
  _buildMultiTargetContainer(step, idx, posts) {
    const container = document.createElement('div');
    container.className = 'step-multi-container';
    container.id = `step-card-${idx}`;

    // Step header + instruction
    const headerDiv = document.createElement('div');
    headerDiv.className = 'step-multi-header';
    headerDiv.innerHTML = `
      <div class="step-header">
        <span class="step-num">STEP ${idx + 1}</span>
        <span class="step-type-badge badge-manual">MANUAL</span>
      </div>
      <div class="step-title">${escHtml(step.name || `Step ${idx + 1}`)}</div>
      ${step.instruction ? `<div class="step-instruction">${escHtml(step.instruction)}</div>` : ''}`;
    container.appendChild(headerDiv);

    // Render sub-cards for each approved post's active targets
    posts.forEach((post, postIdx) => {
      if (post.status !== 'approved') return;
      const activeTargets = (post.targets || []).filter(t => t.status === 'active');
      activeTargets.forEach((target, targetIdx) => {
        container.appendChild(this._buildSubCard(step, idx, post, target, postIdx, targetIdx));
      });
    });

    // Workaround note at the bottom of the container
    if (step.workaround) {
      const wa = document.createElement('div');
      wa.className = 'step-workaround';
      wa.textContent = step.workaround;
      container.appendChild(wa);
    }

    return container;
  },

  // ADR-004: renders a single sub-card for one target subreddit within a multi-target step
  _buildSubCard(step, stepIdx, post, target, postIdx, targetIdx) {
    const card = document.createElement('div');
    card.className = 'step-card manual step-sub-card';
    card.id = `step-card-${stepIdx}-${postIdx}-${targetIdx}`;

    const sub = (target.subreddit || '').replace(/^r\//i, '');
    const navLink = `https://www.reddit.com/r/${sub}/submit`;
    const navDisplayUrl = `www.reddit.com/r/${sub}/submit`;
    const postId = escHtml(post.id || '');
    const subEsc = escHtml(sub);
    const contentId = `sub-content-${stepIdx}-${postIdx}-${targetIdx}`;
    const navUrlId  = `sub-nav-url-${stepIdx}-${postIdx}-${targetIdx}`;
    const cardSuffix = `${stepIdx}-${postIdx}-${targetIdx}`;

    const titleId = `sub-title-${stepIdx}-${postIdx}-${targetIdx}`;
    card.innerHTML = `
      <div class="sub-card-header">
        <span class="sub-label">r/${subEsc}</span>
      </div>
      <div class="step-nav-block">
        <span class="nav-label">NAVIGATE TO</span>
        <div class="nav-url-row">
          <span class="nav-url-display" id="${navUrlId}" data-full="${escHtml(navLink)}">${escHtml(navDisplayUrl)}</span>
          <button class="btn-copy-url" onclick="Missions._copyNavSub('${cardSuffix}', this)">COPY URL</button>
          <button class="step-btn btn-link" onclick="Missions._openLink(document.getElementById('${navUrlId}').dataset.full)">OPEN</button>
        </div>
      </div>
      ${post.title ? `<div class="step-bank-title" style="display:flex;align-items:flex-start;gap:6px;">
        <span class="bank-label" style="flex-shrink:0;">TITLE</span>
        <span id="${titleId}" style="flex:1;word-break:break-word;">${escHtml(post.title)}</span>
        <button class="btn-copy-url" style="flex-shrink:0;" onclick="Missions._copyContentSub('${titleId}', this)">COPY</button>
      </div>` : ''}
      ${(post.body || post.content) ? `<div class="step-content-block" id="${contentId}">${escHtml(post.body || post.content || '')}</div>` : ''}
      <div class="step-actions">
        ${(post.body || post.content) ? `<button class="step-btn btn-copy" onclick="Missions._copyContentSub('${contentId}', this)">COPY BODY</button>` : ''}
        <button class="step-btn btn-done"  onclick="Missions._recordEvent(${stepIdx}, 'done',  this, {subreddit:'${subEsc}', post_id:'${postId}', action:'posted'}, '${cardSuffix}')">DONE</button>
        <button class="step-btn btn-stuck" onclick="Missions._recordEvent(${stepIdx}, 'stuck', this, {subreddit:'${subEsc}', post_id:'${postId}', reason:'rejected'}, '${cardSuffix}')">STUCK</button>
      </div>`;

    return card;
  },

  _buildDeepLink(platform, content, step, titleOverride, subOverride) {
    const p     = (platform || '').toLowerCase();
    // Strip r/ prefix if present -- chain configs store "r/SubName" but URL builder adds its own r/
    const sub   = (subOverride || step.params?.subreddit || '').replace(/^r\//i, '');
    const title = titleOverride || content.split('\n')[0];
    if (p === 'reddit')    return CONFIG.deepLinks.reddit(sub, title, content);
    if (p === 'x' || p === 'twitter') return CONFIG.deepLinks.x(content);
    if (p === 'pinterest') return CONFIG.deepLinks.pinterest(content);
    if (p === 'quora')     return CONFIG.deepLinks.quora();
    if (p === 'gumroad')   return CONFIG.deepLinks.gumroad();
    return null;
  },

  async _copyContent(stepIdx, btn) {
    const el = document.getElementById(`step-content-${stepIdx}`);
    if (!el) return;
    const text = el.textContent;
    try {
      await navigator.clipboard.writeText(text);
    } catch (_) {
      // execCommand fallback for older iOS
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity  = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const orig = btn.textContent;
    btn.textContent = 'COPIED';
    btn.style.color = 'var(--green-hi)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    log('missions', `Step ${stepIdx + 1} content copied`);
  },

  // Copies the full pre-filled URL from the nav block (data-full attribute)
  async _copyNav(stepIdx, btn) {
    const el = document.getElementById(`step-nav-url-${stepIdx}`);
    if (!el) return;
    const url = el.dataset.full || el.textContent;
    try {
      await navigator.clipboard.writeText(url);
    } catch(_) {
      const ta = document.createElement('textarea');
      ta.value = url;
      ta.style.position = 'fixed';
      ta.style.opacity  = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const orig = btn.textContent;
    btn.textContent = 'COPIED';
    btn.style.color = 'var(--green-hi)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    log('missions', `Step ${stepIdx + 1} nav URL copied`);
  },

  // ADR-004: copy URL for a sub-card nav block (uses element ID suffix string)
  async _copyNavSub(cardSuffix, btn) {
    const el = document.getElementById(`sub-nav-url-${cardSuffix}`);
    if (!el) return;
    const url = el.dataset.full || el.textContent;
    try {
      await navigator.clipboard.writeText(url);
    } catch(_) {
      const ta = document.createElement('textarea');
      ta.value = url;
      ta.style.position = 'fixed';
      ta.style.opacity  = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const orig = btn.textContent;
    btn.textContent = 'COPIED';
    btn.style.color = 'var(--green-hi)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    log('missions', `Sub-card ${cardSuffix} nav URL copied`);
  },

  // ADR-004: copy body content for a sub-card (uses full element ID)
  async _copyContentSub(contentId, btn) {
    const el = document.getElementById(contentId);
    if (!el) return;
    const text = el.textContent;
    try {
      await navigator.clipboard.writeText(text);
    } catch (_) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity  = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const orig = btn.textContent;
    btn.textContent = 'COPIED';
    btn.style.color = 'var(--green-hi)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    log('missions', `Sub-card content copied`);
  },

  _openLink(url) {
    window.open(url, '_blank', 'noopener');
    log('missions', `Opened: ${url.slice(0, 60)}...`);
  },

  // ADR-004: extraPayload optional {subreddit, post_id, action/reason}. cardSuffix optional for sub-cards.
  async _recordEvent(stepIdx, eventType, btn, extraPayload, cardSuffix) {
    if (!currentRunId) return;
    const cardId = cardSuffix ? `step-card-${cardSuffix}` : `step-card-${stepIdx}`;
    const card = document.getElementById(cardId);

    try {
      await apiPost('/api/chain/event', {
        run_id:     currentRunId,
        step_index: stepIdx,
        event_type: eventType,
        payload:    extraPayload || {}
      });

      if (eventType === 'done') {
        if (card) {
          card.classList.remove('manual', 'stuck');
          card.classList.add('done');
          const badge = card.querySelector('.step-type-badge');
          if (badge) { badge.className = 'step-type-badge badge-done'; badge.textContent = 'DONE'; }
          const actions = card.querySelector('.step-actions');
          if (actions) actions.innerHTML = '<div class="step-status-msg" style="color:var(--green-hi);">&#10003; COMPLETED</div>';
        }
        const sub = extraPayload?.subreddit ? ` (r/${extraPayload.subreddit})` : '';
        log('chain', `Step ${stepIdx + 1}${sub} marked done`);
      } else {
        if (card) {
          card.classList.add('stuck');
          const badge = card.querySelector('.step-type-badge');
          if (badge) { badge.className = 'step-type-badge badge-stuck'; badge.textContent = 'STUCK'; }
        }
        const sub = extraPayload?.subreddit ? ` (r/${extraPayload.subreddit})` : '';
        log('chain', `Step ${stepIdx + 1}${sub} marked stuck`);
        HUDLayer.showTooltip('Marked as stuck. Try rephrasing or check the workaround note.');
      }
    } catch (e) {
      log('chain', `Event record failed: ${e.message}`);
      HUDLayer.showTooltip(`Error: ${e.message}`);
    }
  }
};

// Back button handler
document.getElementById('stepBackBtn').addEventListener('click', () => {
  currentRunId = null;
  currentChain = null;
  currentSteps = [];
  Missions._renderChainList();
});

// ============================================================
//  SCENE MANAGER
// ============================================================
const SceneManager = {
  current: 'station',
  game:    null,

  init() {
    document.getElementById('loading-msg').style.display = 'flex';

    // Boot Phaser
    try {
      this.game = new Phaser.Game({
        type:        Phaser.AUTO,
        parent:      'phaser-mount',
        transparent: true,
        backgroundColor: 0x0d0d0d,
        scale: {
          mode:   Phaser.Scale.RESIZE,
          parent: 'phaser-mount',
          width:  '100%',
          height: '100%'
        },
        scene: [StationScene],
        audio: { noAudio: true }
      });
      log('sys', 'Phaser 3.60 initialized');
    } catch (e) {
      log('sys', `Phaser init failed: ${e.message}. CSS fallback active.`);
      this._renderCssFallback();
    }

    // Start WebSocket
    connectWS();

    // Initial REST poll (immediate)
    setTimeout(async () => {
      try {
        const data = await apiGet('/api/pipeline/status');
        HUDLayer.updateStats({ pipeline: data });
      } catch (_) {}
    }, 500);

    // Switch to station view
    this.switch('station');
  },

  switch(scene) {
    this.current = scene;

    // Update nav
    ['station','missions','log'].forEach(s => {
      document.getElementById('nav' + s.charAt(0).toUpperCase() + s.slice(1))
        .classList.toggle('active', s === scene);
    });

    // Show/hide panels
    const mOverlay = document.getElementById('missions-overlay');
    const logPanel = document.getElementById('log-panel');
    const pMount   = document.getElementById('phaser-mount');

    mOverlay.classList.remove('active');
    logPanel.classList.remove('active');

    if (scene === 'station') {
      pMount.style.display = '';
      log('sys', 'Station view activated');

    } else if (scene === 'missions') {
      pMount.style.display = 'none';
      mOverlay.classList.add('active');
      Missions.load();
      log('sys', 'Missions view activated');

    } else if (scene === 'log') {
      pMount.style.display = '';
      logPanel.classList.add('active');
      log('sys', 'Log view activated');
    }
  },

  // CSS fallback if Phaser fails to load
  _renderCssFallback() {
    const mount = document.getElementById('phaser-mount');
    mount.style.cssText = 'display:grid;padding:10px;gap:8px;overflow:auto;';
    mount.style.gridTemplateColumns = `repeat(3, 1fr)`;

    CONFIG.rooms.forEach(room => {
      const el = document.createElement('div');
      el.style.cssText = 'background:#111;border:1px solid #2a2218;border-radius:4px;padding:16px 8px;text-align:center;color:#d4b86a;font-size:11px;min-height:80px;display:flex;align-items:center;justify-content:center;';
      el.textContent = room.label.replace('\n',' ');
      mount.appendChild(el);
    });
  }
};

// ============================================================
//  BOOT
// ============================================================
window.addEventListener('load', () => {
  RoomData.init();
  SceneManager.init();
});
</script>
